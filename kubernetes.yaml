apiVersion: v1
kind: Namespace
metadata:
  name: jvargas

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: curso-devops-lab3-config
  namespace: jvargas
data:
  USER_KEY: "user-key-value"

---
apiVersion: v1
kind: Secret
metadata:
  name: curso-devops-lab3-secret
  namespace: jvargas
type: Opaque
stringData:
  BD_PASSWORD: "password-value"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-devops-lab3
  namespace: jvargas
  labels:
    app: curso-devops-lab3
spec:
  replicas: 3
  selector:
    matchLabels:
      app: curso-devops-lab3
  template:
    metadata:
      labels:
        app: curso-devops-lab3
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/jvargast/curso-devops-lab3:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: USER_KEY
              valueFrom:
                configMapKeyRef:
                  name: curso-devops-lab3-config
                  key: USER_KEY
            - name: BD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: curso-devops-lab3-secret
                  key: BD_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: curso-devops-lab3-service
  namespace: jvargas
spec:
  selector:
    app: curso-devops-lab3
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP